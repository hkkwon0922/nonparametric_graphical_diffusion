name: env_gpu
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.26.0
  - scipy>=1.13.1
  - scikit-learn>=1.5.0
  - networkx>=3.2.1
  - matplotlib>=3.9.0
  - seaborn>=0.13.0
  - tqdm>=4.66.0
  - jupyterlab
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu124
    - torch==2.6.0
    - torchvision==0.21.0
    - torchaudio==2.6.0
    - pandas
    - anyio
    - contourpy